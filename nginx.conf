events {
    worker_connections 1024;
}

http {
    upstream bot_backend {
        server bot:7111;
    }

    server {
        listen 80;
        server_name bot.shasero.ru www.bot.shasero.ru;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            try_files $uri =404;
        }

        location /healthcheck {
            return 200;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Этот блок будет использоваться только после получения сертификата
    server {
        listen 443 ssl;
        server_name bot.shasero.ru;

        ssl_certificate /etc/letsencrypt/live/bot.shasero.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/bot.shasero.ru/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_stapling on;
        ssl_stapling_verify on;

        location /webhook {
            proxy_pass http://bot_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 90;
            proxy_connect_timeout 90;
            proxy_send_timeout 90;
        }

        location / {
            return 404;
        }
    }
}