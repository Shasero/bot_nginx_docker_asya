version: '3.8'

services:
  bot:
    build: .
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7111/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    environment:
      - TOKEN=${TOKEN}
      - ADMIN_ID=${ADMIN_ID}
      - ADMIN_ID2=${ADMIN_ID2}
      - NGINX_HOST=${NGINX_HOST}
      - PHONE=${PHONE}
    volumes:
      - ./logs:/bot/logs
      - ./data:/bot/data
      - ./.env:/bot/.env
    expose:
      - "7111"
    restart: always
    networks:
      - bot_network

  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    depends_on:
      bot:
        condition: service_started
    restart: unless-stopped
    networks:
      - bot_network

  certbot:
    image: certbot/certbot:v4.0.0
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    depends_on:
      nginx:
        condition: service_started
    networks:
      - bot_network
    command: >
      sh -c "
      sleep 15
      certbot certonly --webroot -w /var/www/certbot
      --email romaa251205@gmail.com
      -d bot.shasero.ru
      --agree-tos
      --non-interactive
      --force-renewal
      "

networks:
  bot_network:
    driver: bridge