networks:
  def:

services:
  bot:
    build: .
    environment:
      - TOKEN=${TOKEN}
      - ADMIN_ID=${ADMIN_ID}
      - ADMIN_ID2=${ADMIN_ID2}
      - NGINX_HOST=${NGINX_HOST}
      - PHONE=${PHONE}
    volumes:
      - ./logs:/bot/logs
      - ./data:/bot/data
      - ./.env:/bot/.env
    ports:
      - "7111:7111"
    restart: always
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - def

  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - ./.env
    restart: unless-stopped
    environment:
      - NGINX_HOST=${NGINX_HOST}
      - WEBHOOK_URL=https://${NGINX_HOST}/webhook
    volumes:
      - './nginx.conf:/etc/nginx/nginx.conf'
      - './certbot/www:/var/www/certbot'
      - './certbot/conf:/etc/letsencrypt'
    networks:
      - def

  certbot:
    image: certbot/certbot:v4.0.0
    volumes:
      - './certbot/www:/var/www/certbot'
      - './certbot/conf:/etc/letsencrypt'
    env_file:
      - ./.env
    restart: on-failure
    depends_on:
      nginx:
        condition: service_started
    networks:
      - def
    command: >
      sh -c "
      sleep 15 &&
      certbot certonly --webroot -w /var/www/certbot
      --email romaa251205@gmail.com
      -d $${NGINX_HOST}
      --agree-tos
      --non-interactive
      --force-renewal
      "