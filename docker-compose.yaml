services:
  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/www:/var/www/certbot:rw
      - ./certbot/conf:/etc/letsencrypt:rw
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/.well-known/acme-challenge/healthcheck || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    command: >
      sh -c "
      while [ ! -f /etc/letsencrypt/live/$$NGINX_HOST/fullchain.pem ]; do
        echo 'Ожидание сертификата...';
        sleep 5;
      done &&
      nginx -t &&
      nginx -g 'daemon off;'
      "
    networks:
      - bot_network

  certbot:
    image: certbot/certbot:v4.0.0
    volumes:
      - ./certbot/www:/var/www/certbot:rw
      - ./certbot/conf:/etc/letsencrypt:rw
      - ./certbot-init.sh:/certbot-init.sh:ro
    entrypoint: "/bin/sh"
    command: ["-c", "chmod +x /certbot-init.sh && /certbot-init.sh"]
    environment:
      - NGINX_HOST=$$NGINX_HOST
      - CERTBOT_EMAIL=$$CERTBOT_EMAIL
    depends_on:
      nginx:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - bot_network

  bot:
    build: .
    environment:
      - TOKEN=$$TOKEN
      - ADMIN_ID=$$ADMIN_ID
      - ADMIN_ID2=$$ADMIN_ID2
      - NGINX_HOST=$$NGINX_HOST
      - PHONE=$$PHONE
    volumes:
      - ./logs:/bot/logs
      - ./data:/bot/data
      - ./.env:/bot/.env
    expose:
      - "7111"
    restart: always
    depends_on:
      - nginx
    networks:
      - bot_network

networks:
  bot_network:
    driver: bridge